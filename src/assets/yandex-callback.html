<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yandex OAuth Callback</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .loader {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #ffcc00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p {
      color: #475569;
      font-size: 14px;
    }
    .error {
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="loader"></div>
    <p>Обработка авторизации Yandex...</p>
  </div>

  <script>
    (function() {
      function parseFragment() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const tokenType = params.get('token_type');
        const expiresIn = params.get('expires_in');
        return { accessToken, tokenType, expiresIn };
      }

      function sendError(message) {
        if (window.opener) {
          window.opener.postMessage({ error: message }, window.location.origin);
        }
        document.getElementById('container').innerHTML = `
          <p style="color: #991b1b;">Ошибка: ${message}</p>
          <p style="font-size: 12px; margin-top: 12px;">Закройте это окно и попробуйте снова.</p>
        `;
      }

      async function fetchYandexUser(token) {
        try {
          const response = await fetch('https://login.yandex.ru/info', {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          if (!response.ok) {
            throw new Error('Failed to fetch user info');
          }
          const data = await response.json();
          return {
            id: data.id,
            first_name: data.first_name || '',
            last_name: data.last_name || '',
            display_name: data.display_name || '',
            avatar_url: data.default_avatar_id ? `https://avatars.yandex.net/get-yapic/${data.default_avatar_id}/islands-200` : '',
            email: data.emails && data.emails.length ? data.emails[0] : '',
            hash: token.substring(0, 10)
          };
        } catch (err) {
          console.error('Yandex user fetch error:', err);
          throw err;
        }
      }

      (async function main() {
        const { accessToken } = parseFragment();

        if (!accessToken) {
          sendError('No access token received');
          return;
        }

        try {
          const userData = await fetchYandexUser(accessToken);
          if (window.opener) {
            window.opener.postMessage({ type: 'yandex', payload: userData }, window.location.origin);
            document.getElementById('container').innerHTML = `
              <p style="color: #166534;">Авторизация успешна!</p>
              <p style="font-size: 12px; margin-top: 12px;">Закройте это окно.</p>
            `;
            setTimeout(() => window.close(), 1500);
          } else {
            const redirectUrl = `${window.location.origin}?yandex_user=${encodeURIComponent(JSON.stringify(userData))}`;
            window.location.replace(redirectUrl);
          }
        } catch (err) {
          sendError(err.message || 'Failed to get user data');
        }
      })();
    })();
  </script>
</body>
</html>
